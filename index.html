<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShelfWise Library | Login</title>
    <link rel="stylesheet" href="./assets/styles/main.css" />
  </head>
  <body class="login-page">
    <section class="login-card fade-in">
      <div class="login-cover">
        <h1 class="login-title fade-in fade-delay-1">ShelfWise Library</h1>
        <p class="fade-in fade-delay-2">
          A modern college library management experience with live dashboard insights and simple record management.
        </p>
      </div>

      <div class="login-form-area">
        <h2>Sign In</h2>
        <p>Welcome back! Please login to manage your library.</p>

        <form id="login-form" class="form-grid">
          <div class="field" style="grid-column: 1 / -1">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Enter username" required />
          </div>
          <div class="field" style="grid-column: 1 / -1">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" required />
          </div>
          <button type="submit" class="primary-btn" style="grid-column: 1 / -1">Login</button>
        </form>

        <p id="login-error" class="error-msg"></p>
        <div class="hint-box">Demo credentials: <strong>admin</strong> / <strong>admin123</strong></div>
      </div>
    </section>

    <script type="module" src="./assets/scripts/login.js"></script>
  </body>
</html>
